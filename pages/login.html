<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: blob:; connect-src 'self';" />
    <title>Login - Barbearia</title>
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="../styles/login.css">
</head>

<body>
    <header aria-label="Menu Principal">
        <nav aria-label="Menu Principal">
            <ul role="list">
                <li class="index"><a href="../index.html">
                        <i class="bi bi-house"></i>
                        Início</a>
                </li>
                <hr>
                <li class="contatos"><a href="../pages/contatos.html">
                        <i class="bi bi-telephone"></i>
                        Contatos</a>
                </li>
                <hr>
                <li class="login">
                    <a href="../pages/login.html">
                        <i class="bi bi-person"></i>
                        Login</a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="login card-glass">
            <h1>Login</h1>
            <div class="login-container">
                <form id="form-login" autocomplete="on" novalidate>
                    <div class="input-group" aria-label="Email" aria-required="true">
                        <label for="email"><i class="bi bi-envelope"></i> Email</label>
                        <input type="email" id="email" name="email" placeholder="Digite seu email" required autocomplete="email">
                    </div>
                    <div class="input-group" aria-label="Senha" aria-required="true">
                        <label for="senha"><i class="bi bi-lock"></i> Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required minlength="6" autocomplete="current-password">
                    </div>
                    <button type="submit" class="login-btn">Login</button>
                    <a class="forgot-password botao-modal" onclick="esqueceuASenha()">Esqueci minha senha</a>
                    <a class="register" href="../pages/cadastro.html">Não tenho uma conta</a>
                </form>
            </div>
        </section>

        <aside>
            <div class="modal-fundo">
                <div class="modal-conteudo card-glass-modal">
                    <h2>Esqueci minha senha</h2>
                    <form id="form-recuperacao" autocomplete="on">
                        <div class="input-group">
                            <input class="forgot-password-input" type="email" id="email-recuperacao" name="email-recuperacao" placeholder="Digite seu email" required autocomplete="email">
                            <button class="forgot-password-btn" type="submit" aria-label="Enviar email">Enviar</button>
                        </div>
                        <button type="button" class="botao-fechar" aria-label="Fechar modal">
                            <i class="bi bi-x"></i>
                        </button>
                    </form>
                </div>
            </div>
        </aside>
    </main>

    <footer>Todos os direitos reservados © - Desenvolvido por: <a href="https://github.com/Brrn91" target="_blank"
            rel="noopener noreferrer">Lucas Bruno</a></footer>
    <script src="../scripts/login.js"></script>
</body>

</html>
