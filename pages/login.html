<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barbearia</title>
    <!--Styles-->
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="../styles/login.css">
</head>

<body>
    <header aria-label="Menu Principal">
        <nav aria-label="Menu Principal">
            <ul role="list">
                <li class="index"><a href="../index.html">
                        <i class="bi bi-house"></i>
                        Início</a>
                </li>
                <hr>
                <li class="contatos"><a href="../pages/contatos.html">
                        <i class="bi bi-telephone"></i>
                        Contatos</a>
                </li>
                <hr>
                <li class="login">
                        <i class="bi bi-person"></i>
                        Login</a>
                </li>
            </ul>
        </nav>
    </header>

    <main aria-label="Login">
        <section class="login">
            <h1>Login</h1>
            <div class="login-container">
                <form action="" method="post" autocomplete="off" aria-label="Formulário de Login">
                    <div class="input-group" aria-label="Email" aria-required="true">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Digite seu email" required>
                    </div>
                    <div class="input-group" aria-label="Senha" aria-required="true">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                    </div>
                    <a type="submit" class="login-btn" href="../pages/painel.html">Login</a>
                    <a class="forgot-password botao-modal">Esqueci minha senha</a>
                    <a class="register" href="../pages/cadastro.html">Não tenho uma conta</a>
                </form>
            </div>
        </section>

        <aside aria-label="Modal de Esqueci minha senha">
            <div class="modal-fundo">
                <div class="modal-conteudo">
                    <h2>Esqueci minha senha</h2>
                        <form action="" method="post" autocomplete="off">
                        <div class="input-group" aria-label="Email" aria-required="true">
                            <input class="forgot-password-input" type="email" id="email" name="email" placeholder="Digite seu email" required>
                            <button type="submit" class="forgot-password-btn">Enviar</button>
                        </div>
                        <button class="botao-fechar">
                            <i class="bi bi-x"></i>
                        </button>
                    </form>
                </div>
            </div>
        </aside>
    </main>

    <footer>Todos os direitos reservados © - Desenvolvido por: <a href="https://github.com/Brrn91" target="_blank"
            rel="nofollow">Lucas Bruno</a></footer>
    <!--JavaScript-->
    <script src="../scripts/esqueci-a-senha.js"></script>
</body>

</html>
