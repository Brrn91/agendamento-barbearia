<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: blob:; connect-src 'self';" />
    <title>Agendamento - Barbearia</title>
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="../styles/agendamento.css">
</head>

<body>
    <header>
        <nav aria-label="Menu Principal">
            <ul role="list">
                <li><a href="../index.html">
                        <i class="bi bi-house"></i>
                        Início</a>
                </li>
                <hr>
                <li><a href="../pages/contatos.html">
                        <i class="bi bi-telephone"></i>
                        Contatos</a>
                </li>
                <hr>
                <li>
                    <a href="../pages/login.html">
                        <i class="bi bi-person"></i>
                        Login</a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="agendamento card-glass">
            <h1>Agendamento</h1>
            <div class="agendamento-container">
                <form id="form-agendamento" autocomplete="on" novalidate>
                    <div class="input-group" aria-label="Nome" aria-required="true">
                        <label for="name"><i class="bi bi-person"></i> Nome</label>
                        <input type="text" name="name" id="name" required minlength="3" placeholder="Escreva seu nome" autocomplete="name">
                    </div>
                    <div class="input-group" aria-label="Serviço" aria-required="true">
                        <label for="servico"><i class="bi bi-scissors"></i> Serviço</label>
                        <select id="servico" name="servico" required>
                            <option value="">Selecione um serviço</option>
                            <option value="corte">Corte de cabelo</option>
                            <option value="barba">Barba</option>
                            <option value="corte-barba">Corte de cabelo e barba</option>
                        </select>
                    </div>
                    <div class="input-group" aria-label="Barbeiro" aria-required="true">
                        <label for="barbeiro"><i class="bi bi-person-workspace"></i> Barbeiro</label>
                        <select id="barbeiro" name="barbeiro" required>
                            <option value="">Selecione um barbeiro</option>
                            <option value="barbeiro1">Barbeiro 1</option>
                            <option value="barbeiro2">Barbeiro 2</option>
                        </select>
                    </div>
                    <div class="input-group" aria-label="Data" aria-required="true">
                        <label for="data"><i class="bi bi-calendar3"></i> Data</label>
                        <input type="date" id="data" name="data" required>
                    </div>
                    <div class="input-group" aria-label="Hora" aria-required="true">
                        <label for="hora"><i class="bi bi-clock"></i> Hora</label>
                        <input type="time" id="hora" name="hora" required min="09:00" max="20:00">
                        <span class="time-hint">Horário de funcionamento: 09h às 20h</span>
                    </div>
                    <button type="submit" class="agendamento-btn">Agendar</button>
                </form>
            </div>
        </section>
    </main>

    <footer>Todos os direitos reservados © - Desenvolvido por: <a href="https://github.com/Brrn91" target="_blank"
            rel="noopener noreferrer">Lucas Bruno</a></footer>
    <script src="../scripts/agendamento.js"></script>
</body>

</html>
