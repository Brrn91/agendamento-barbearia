<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: blob:; connect-src 'self';" />
    <title>Cadastro - Barbearia</title>
    <link rel="stylesheet" href="../styles/index.css" />
    <link rel="stylesheet" href="../styles/cadastro.css" />
  </head>
  <body>
    <header>
      <nav aria-label="Menu Principal">
        <ul role="list">
          <li class="index"><a href="../index.html">
              <i class="bi bi-house"></i>
              Início</a>
          </li>
          <hr>
          <li class="contatos"><a href="../pages/contatos.html">
              <i class="bi bi-telephone"></i>
              Contatos</a>
          </li>
          <hr>
          <li class="login"><a href="../pages/login.html">
              <i class="bi bi-person"></i>
              Login</a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="cadastro card-glass" aria-label="Cadastro">
        <h1>Cadastro</h1>
        <form id="form-cadastro" autocomplete="on" novalidate aria-label="Formulário de Cadastro">
          <div class="input-group" aria-label="Nome" aria-required="true">
            <label for="nome"><i class="bi bi-person"></i> Nome</label>
            <input type="text" id="nome" name="nome" required minlength="3" placeholder="Seu nome completo" autocomplete="name">
          </div>
          <div class="input-group" aria-label="Email" aria-required="true">
            <label for="email"><i class="bi bi-envelope"></i> Email</label>
            <input type="email" id="email" name="email" required placeholder="seu@email.com" autocomplete="email">
          </div>
          <div class="input-group" aria-label="Senha" aria-required="true">
            <label for="senha"><i class="bi bi-lock"></i> Senha</label>
            <input type="password" id="senha" name="senha" required minlength="6" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
            <span class="password-hint">Mínimo de 6 caracteres</span>
          </div>
          <div class="input-group" aria-label="Confirmar Senha" aria-required="true">
            <label for="confirmar-senha"><i class="bi bi-lock-fill"></i> Confirmar Senha</label>
            <input type="password" id="confirmar-senha" name="confirmar-senha" required minlength="6" placeholder="Repita a senha" autocomplete="new-password">
            <span class="password-error" id="password-error"></span>
          </div>
          <button type="submit" class="cadastro-btn">Cadastrar</button>
        </form>
      </section>
    </main>
    
    <footer>Todos os direitos reservados © - Desenvolvido por: <a href="https://github.com/Brrn91" target="_blank"
            rel="noopener noreferrer">Lucas Bruno</a></footer>
    <script src="../scripts/cadastro.js"></script>
  </body>
</html>
