<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: blob:; connect-src 'self';" />
    <title>Cadastro - Barbearia</title>
    <link rel="stylesheet" href="../styles/output.css" />
  </head>
  <body class="font-ubuntu">
    <header class="sticky top-0 z-50 w-full bg-escuro shadow-lg">
      <div class="flex items-center justify-between px-4 h-16 max-w-5xl mx-auto">
        <button id="menu-toggle" class="md:hidden text-white p-2 rounded hover:bg-destaque transition" aria-label="Abrir menu" aria-expanded="false">
          <i class="bi bi-list text-2xl"></i>
        </button>
        <nav class="w-full md:w-auto" aria-label="Menu Principal">
          <ul id="menu" role="list" class="hidden md:flex flex-col md:flex-row items-center justify-center gap-2 md:gap-4 w-full md:w-auto py-4 md:py-0">
            <li class="index">
              <a href="../index.html" class="nav-link text-white flex items-center gap-2 px-4 py-3 rounded-lg hover:bg-destaque hover:scale-105 transition">
                <i class="bi bi-house"></i>
                <span>Início</span>
              </a>
            </li>
            <li class="hidden md:block w-px h-8 bg-white/20"></li>
            <li class="contatos">
              <a href="../pages/contatos.html" class="nav-link text-white flex items-center gap-2 px-4 py-3 rounded-lg hover:bg-destaque hover:scale-105 transition">
                <i class="bi bi-telephone"></i>
                <span>Contatos</span>
              </a>
            </li>
            <li class="hidden md:block w-px h-8 bg-white/20"></li>
            <li class="login">
              <a href="../pages/login.html" class="nav-link text-white flex items-center gap-2 px-4 py-3 rounded-lg hover:bg-destaque hover:scale-105 transition">
                <i class="bi bi-person"></i>
                <span>Login</span>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="flex flex-col items-center justify-center min-h-[calc(100dvh-8rem)] w-full p-5">
      <section class="cadastro card-glass animate-fade-in-up flex flex-col items-center justify-center w-full max-w-md p-8" aria-label="Cadastro">
        <h1 class="text-3xl md:text-4xl lg:text-5xl text-white mb-6 text-center">Cadastro</h1>
        <form id="form-cadastro" autocomplete="on" novalidate aria-label="Formulário de Cadastro" class="flex flex-col items-center justify-center w-full gap-2">
          <div class="input-group flex flex-col w-full">
            <label for="nome" class="text-claro text-sm md:text-base mb-1 text-left pl-1">
              <i class="bi bi-person mr-1"></i> Nome
            </label>
            <input type="text" id="nome" name="nome" required minlength="3" placeholder="Seu nome completo" autocomplete="name" class="input-field">
          </div>
          <div class="input-group flex flex-col w-full">
            <label for="email" class="text-claro text-sm md:text-base mb-1 text-left pl-1">
              <i class="bi bi-envelope mr-1"></i> Email
            </label>
            <input type="email" id="email" name="email" required placeholder="seu@email.com" autocomplete="email" class="input-field">
          </div>
          <div class="input-group flex flex-col w-full">
            <label for="senha" class="text-claro text-sm md:text-base mb-1 text-left pl-1">
              <i class="bi bi-lock mr-1"></i> Senha
            </label>
            <input type="password" id="senha" name="senha" required minlength="6" placeholder="Mínimo 6 caracteres" autocomplete="new-password" class="input-field">
            <span class="password-hint text-xs text-claro mt-1 opacity-70">Mínimo de 6 caracteres</span>
          </div>
          <div class="input-group flex flex-col w-full">
            <label for="confirmar-senha" class="text-claro text-sm md:text-base mb-1 text-left pl-1">
              <i class="bi bi-lock-fill mr-1"></i> Confirmar Senha
            </label>
            <input type="password" id="confirmar-senha" name="confirmar-senha" required minlength="6" placeholder="Repita a senha" autocomplete="new-password" class="input-field">
            <span class="password-error text-xs text-erro mt-1 min-h-[1.2em]" id="password-error"></span>
          </div>
          <button type="submit" class="cadastro-btn btn-primary mt-4">Cadastrar</button>
        </form>
      </section>
    </main>
    
    <footer class="bg-escuro w-full min-h-[3rem] px-5 py-2.5 text-claro text-center flex justify-center items-center text-sm mt-2">
      Todos os direitos reservados © - Desenvolvido por: <a href="https://github.com/Brrn91" target="_blank" rel="noopener noreferrer" class="text-claro no-underline pl-2 font-bold hover:text-azul hover:underline transition">Lucas Bruno</a>
    </footer>
    <script src="../scripts/cadastro.js"></script>
    <script>
      const menuToggle = document.getElementById('menu-toggle');
      const menu = document.getElementById('menu');
      menuToggle?.addEventListener('click', () => {
        const isExpanded = menuToggle.getAttribute('aria-expanded') === 'true';
        menuToggle.setAttribute('aria-expanded', !isExpanded);
        menu.classList.toggle('hidden');
        const icon = menuToggle.querySelector('i');
        icon.classList.toggle('bi-list');
        icon.classList.toggle('bi-x-lg');
      });
    </script>
  </body>
</html>
