<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barbearia</title>
    <!--Style-->
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/login.css">
</head>

<body>
    <header>
        <nav aria-label="Menu Principal">
            <ul role="list">
                <li><a href="index.html">
                        <i class="bi bi-house"></i>
                        Início</a>
                </li>
                <li>
                    <a href="contatos.html">
                        <i class="bi bi-telephone"></i>
                        Contatos</a>
                </li>
                <li>
                    <a href="login.html">
                        <i class="bi bi-person"></i>
                        Login</a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="login">
            <h1>Login</h1>
            <div class="login-container">
                <form action="">
                    <div class="input-group">
                        <label for="email" aria-label="Email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Digite seu email">
                    </div>
                    <div class="input-group">
                        <label for="senha" aria-label="Senha">Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
                    </div>
                    <button type="submit">Login</button>
                </form>
            </div>
        </section>
    </main>

    <footer>Todos os direitos reservados © - Desenvolvido por: <a href="https://github.com/Brrn91" target="_blank"
            rel="nofollow">Lucas Bruno</a></footer>
    <!--JavaScript-->
</body>

</html>
